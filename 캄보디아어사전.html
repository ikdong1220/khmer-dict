<title>캄보디아어 사전</title>
<style>
  :root{
    --bg:#f4f2ec; --card:#ffffff; --text:#1c2333; --sub:#6b7280;

    --km:#0f4c81; --border:#e5e1d6; --chip:#ffffff; --chip-on:#1a2942;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#12151c; --card:#1c212c; --text:#eef1f6; --sub:#9aa3b2;
      --accent:#141a26; --gold:#e0b940; --pill-bg:#3a3013; --pill-text:#f0cf5e;
      --km:#7ab8f5; --border:#2a3040; --chip:#232a38; --chip-on:#e0b940;
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Noto Sans Khmer","Khmer Sangam MN",sans-serif;
  }
  header{
    position:sticky; top:0; z-index:10; background:var(--accent);
    padding:calc(env(safe-area-inset-top) + 14px) 16px 10px;
    box-shadow:0 2px 10px rgba(0,0,0,.18);
  }
  h1{margin:0 0 10px; font-size:19px; color:#fff; letter-spacing:.5px; display:flex; align-items:center; gap:8px;}
  h1 small{font-size:12px; font-weight:400; color:#c9d3e4; margin-left:auto;}
  .search-wrap{position:relative;}
  #q{
    width:100%; padding:13px 44px 13px 16px; font-size:16px; border:none; border-radius:14px;
    background:#fff; color:#1c2333; outline:none;
  }
  @media (prefers-color-scheme: dark){ #q{background:#2a3040; color:#eef1f6;} }
  #clearBtn{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    border:none; background:transparent; font-size:18px; color:#9aa3b2; padding:8px; display:none;
  }
  .chips{
    display:flex; gap:8px; overflow-x:auto; padding:12px 2px 4px; scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; padding:8px 14px; border-radius:20px; font-size:13.5px; border:none;
    background:rgba(255,255,255,.14); color:#dfe6f2; font-weight:600;
  }
  .chip.on{background:var(--gold); color:#1a2942;}
  main{padding:12px 14px calc(env(safe-area-inset-bottom) + 40px); max-width:640px; margin:0 auto;}
  .cat-head{
    font-size:13px; font-weight:700; color:var(--sub); margin:20px 4px 8px; letter-spacing:1px;
  }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:14px 16px; margin-bottom:10px; box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .row1{display:flex; align-items:flex-start; gap:8px;}
  .ko{font-size:16.5px; font-weight:700; flex:1; line-height:1.35;}
  .star{border:none; background:none; font-size:22px; line-height:1; padding:2px 4px; color:#c9c4b4; flex:0 0 auto;}
  .star.on{color:var(--gold);}
  .km{
    font-size:27px; line-height:1.5; color:var(--km); margin:6px 0 2px; word-break:break-word;
    font-family:"Noto Sans Khmer","Khmer Sangam MN","Khmer OS",sans-serif;
  }
  .row2{display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap;}
  .pron{
    background:var(--pill-bg); color:var(--pill-text); font-weight:800; font-size:17px;
    padding:5px 13px; border-radius:20px;
  }
  .note{font-size:12.5px; color:var(--sub); width:100%;}
  .icon-btn{
    border:1px solid var(--border); background:var(--card); color:var(--sub);
    border-radius:10px; font-size:15px; padding:6px 10px; margin-left:auto;
  }
  .icon-btn:last-child{margin-left:0;}
  .empty{text-align:center; color:var(--sub); padding:60px 20px; font-size:15px;}
  #toast{
    position:fixed; bottom:calc(env(safe-area-inset-bottom) + 24px); left:50%; transform:translateX(-50%) translateY(20px);
    background:#1a2942; color:#fff; padding:10px 22px; border-radius:24px; font-size:14px;
    opacity:0; pointer-events:none; transition:all .25s; white-space:nowrap; z-index:20;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>

DATA.forEach((d,i)=>d.id=i);
const CATS = [...new Set(DATA.map(d=>d.c))];
const FAV_KEY = "khdict_fav_v1";
let favs = new Set(JSON.parse(localStorage.getItem(FAV_KEY)||"[]"));
let curCat = "전체";

const $q = document.getElementById("q");
const $list = document.getElementById("list");
const $chips = document.getElementById("chips");
const $clear = document.getElementById("clearBtn");
document.getElementById("count").textContent = DATA.length + "개 수록";

// 초성 검색 지원
const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function toCho(s){
  return [...s].map(ch=>{
    const c = ch.charCodeAt(0);
    if(c>=0xAC00 && c<=0xD7A3) return CHO[Math.floor((c-0xAC00)/588)];
    return ch;
  }).join("");
}
const isChoQuery = s => /^[ㄱ-ㅎ\s]+$/.test(s);

function norm(s){ return s.toLowerCase().replace(/\s+/g,""); }

function match(d, q){
  if(!q) return true;
  if(isChoQuery(q)){
    return toCho(d.ko).replace(/\s+/g,"").includes(q.replace(/\s+/g,""));
  }
  const n = norm(q);
  return norm(d.ko).includes(n) || norm(d.p).includes(n) || norm(d.km).includes(n);
}

function saveFavs(){ localStorage.setItem(FAV_KEY, JSON.stringify([...favs])); }

function renderChips(){
  const names = ["전체","★ 즐겨찾기",...CATS];
  $chips.innerHTML = names.map(n=>
    `<button class="chip${n===curCat?" on":""}" data-cat="${n}">${n}</button>`
  ).join("");
}

function card(d){
  const fav = favs.has(d.id);
  return `<div class="card" data-id="${d.id}">
    <div class="row1">
      <div class="ko">${d.ko}</div>
      <button class="star${fav?" on":""}" data-fav="${d.id}" aria-label="즐겨찾기">${fav?"★":"☆"}</button>
    </div>
    <div class="km">${d.km}</div>
    <div class="row2">
      <span class="pron">${d.p}</span>
      <button class="icon-btn" data-copy="${d.id}">복사</button>
      <button class="icon-btn" data-speak="${d.id}">🔊</button>
      ${d.n?`<span class="note">💡 ${d.n}</span>`:""}
    </div>
  </div>`;
}

function render(){
  const q = $q.value.trim();
  $clear.style.display = q ? "block" : "none";
  let items = DATA.filter(d=>match(d,q));
  if(curCat==="★ 즐겨찾기") items = items.filter(d=>favs.has(d.id));
  else if(curCat!=="전체") items = items.filter(d=>d.c===curCat);

  if(items.length===0){
    $list.innerHTML = `<div class="empty">${curCat==="★ 즐겨찾기"&&!q ? "별표(☆)를 눌러 자주 쓰는 표현을 저장하세요" : "검색 결과가 없어요 😢"}</div>`;
    return;
  }
  // 검색 중이 아닐 때는 카테고리 제목과 함께 표시
  let html = "";
  if(!q && curCat==="전체"){
    for(const cat of CATS){
      const group = items.filter(d=>d.c===cat);
      if(!group.length) continue;
      html += `<div class="cat-head">${cat}</div>` + group.map(card).join("");
    }
  }else{
    html = items.map(card).join("");
  }
  $list.innerHTML = html;
}

$q.addEventListener("input", render);
$clear.addEventListener("click", ()=>{ $q.value=""; render(); $q.focus(); });

$chips.addEventListener("click", e=>{
  const b = e.target.closest("[data-cat]");
  if(!b) return;
  curCat = b.dataset.cat;
  renderChips(); render();
  window.scrollTo({top:0});
});

let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1400);
}

$list.addEventListener("click", e=>{
  const favBtn = e.target.closest("[data-fav]");
  if(favBtn){
    const id = +favBtn.dataset.fav;
    favs.has(id) ? favs.delete(id) : favs.add(id);
    saveFavs(); render();
    return;
  }
  const copyBtn = e.target.closest("[data-copy]");
  if(copyBtn){
    const d = DATA[+copyBtn.dataset.copy];
    const text = d.km;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>toast("캄보디아어 복사됨 ✓"));
    }else{
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); ta.remove(); toast("캄보디아어 복사됨 ✓");
    }
    return;
  }
  const spBtn = e.target.closest("[data-speak]");
  if(spBtn){
    const d = DATA[+spBtn.dataset.speak];
    try{
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(d.km);
      u.lang = "km-KH"; u.rate = 0.85;
      const v = speechSynthesis.getVoices().find(v=>v.lang && v.lang.startsWith("km"));
      if(v) u.voice = v;
      else { toast("이 기기에 캄보디아어 음성이 없어요"); }
      speechSynthesis.speak(u);
    }catch(err){ toast("음성 재생을 지원하지 않아요"); }
  }
});

renderChips();
render();
